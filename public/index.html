<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fute Global — Lead Management</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F5F7FA;--card:#FFFFFF;--border:#E2E8F0;--border2:#CBD5E1;
--text:#0F172A;--text2:#475569;--text3:#94A3B8;
--accent:#2563EB;--accent-l:#EFF6FF;--accent-m:#3B82F6;
--teal:#0D9488;--teal-l:#F0FDFA;
--green:#16A34A;--green-l:#F0FDF4;
--amber:#D97706;--amber-l:#FFFBEB;
--red:#DC2626;--red-l:#FEF2F2;
--purple:#7C3AED;--purple-l:#F5F3FF;
--r:8px;--r2:12px;--r3:16px;
--sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
--sh2:0 4px 16px rgba(0,0,0,.09),0 2px 4px rgba(0,0,0,.05);
--sh3:0 20px 40px rgba(0,0,0,.12);
--font:'DM Sans',system-ui,sans-serif;
--display:'Sora',system-ui,sans-serif;
--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
*{-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
input,select,textarea,button{font-family:var(--font);font-size:14px;color:inherit}
button{cursor:pointer;border:none;background:none;outline:none}
a{color:inherit;text-decoration:none}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
@media(max-width:640px){
  #sidebar{width:200px;min-width:200px}
  .page{padding:16px 14px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .span2,.span3{grid-column:span 1}
  .stat-grid{grid-template-columns:1fr 1fr}
  .banner-stats{gap:12px}
  .bstat-val{font-size:18px}
  .detail-panel{width:100%;min-width:0;position:fixed;inset:0;z-index:50;overflow-y:auto}
  .tbl-wrap{font-size:12px}
  th,td{padding:8px 8px}
}
#sidebar{width:228px;min-width:228px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:54px;min-height:54px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
#content{flex:1;overflow-y:auto;overflow-x:auto}

/* SIDEBAR */
.sb-brand{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--display);font-weight:700;font-size:13px;flex-shrink:0}
.sb-name{font-family:var(--display);font-weight:600;font-size:14.5px}
.sb-sub{font-size:10px;color:var(--text3)}
.sb-nav{padding:10px 10px 4px}
.sb-lbl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:0 8px;margin-bottom:3px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);color:var(--text2);cursor:pointer;font-size:13.5px;transition:all .12s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-l);color:var(--accent);font-weight:500}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:.55}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:var(--mono)}
.sb-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:var(--r2);cursor:pointer;transition:background .12s}
.user-row:hover{background:var(--bg)}
.u-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-role{font-size:11px;color:var(--text3)}
.signout{font-size:11.5px;color:var(--text3);cursor:pointer;padding:3px 2px;transition:color .12s;display:inline-block}
.signout:hover{color:var(--red)}

/* AVATAR */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-family:var(--display)}
.av-32{width:32px;height:32px;font-size:12px}
.av-28{width:28px;height:28px;font-size:11px}
.av-40{width:40px;height:40px;font-size:14px}
.av-48{width:48px;height:48px;font-size:16px}
.av-admin{background:#EDE9FE;color:#5B21B6}
.av-bd{background:#DBEAFE;color:#1D4ED8}
.av-ra{background:#DCFCE7;color:#166534}
.av-sp{background:#FCE7F3;color:#9D174D}

/* TOPBAR */
.tb-title{font-family:var(--display);font-weight:600;font-size:15.5px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-date{font-size:12px;color:var(--text3);font-family:var(--mono)}
.switcher{display:flex;gap:5px;padding:4px 8px;background:var(--bg);border-radius:var(--r2);border:1px solid var(--border)}
.sw-av{cursor:pointer;transition:opacity .12s;border-radius:50%;border:2px solid transparent}
.sw-av:hover{border-color:var(--accent)}
.sw-av.me{border-color:var(--accent)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:var(--r);font-weight:500;font-size:13.5px;transition:all .12s;cursor:pointer;white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#1D4ED8}
.btn-outline{background:var(--card);color:var(--text);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--bg)}
.btn-ghost{color:var(--text2)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid rgba(220,38,38,.15)}
.btn-danger:hover{background:#FCA5A5}
.btn-sm{padding:5px 11px;font-size:12.5px}
/* Email preview panel — visible only on very wide screens */
.email-preview-panel{width:360px;flex-shrink:0;display:block}
@media(max-width:1380px){.email-preview-panel{display:none !important}}
.tab{padding:9px 18px;font-size:13.5px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--bg);border-radius:var(--r) var(--r) 0 0}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.btn-xs{padding:3px 8px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;border-radius:var(--r);display:inline-flex;align-items:center;justify-content:center;color:var(--text3)}
.btn-icon:hover{background:var(--bg);color:var(--text)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r3);box-shadow:var(--sh)}
.cp{padding:20px 22px}

/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:500;white-space:nowrap}
.bdg-blue{background:var(--accent-l);color:var(--accent)}
.bdg-green{background:var(--green-l);color:var(--green)}
.bdg-amber{background:var(--amber-l);color:var(--amber)}
.bdg-red{background:var(--red-l);color:var(--red)}
.bdg-purple{background:var(--purple-l);color:var(--purple)}
.bdg-teal{background:var(--teal-l);color:var(--teal)}
.bdg-gray{background:var(--bg);color:var(--text2)}

/* STAGE */
.st-Active{background:#DCFCE7;color:#15803D}
.st-No_Response{background:#FEF9C3;color:#A16207}
.st-Negative{background:#FEE2E2;color:#B91C1C}
.st-Positive{background:#D1FAE5;color:#065F46}
.st-Connected{background:#DBEAFE;color:#1D4ED8}
.st-Future{background:#EDE9FE;color:#6D28D9}
.st-Out_of_Office{background:#E0F2FE;color:#0369A1}
.st-Deactivated{background:#F1F5F9;color:#64748B}
.st-Referred{background:#FDF4FF;color:#9333EA}

/* INPUTS */
.inp{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);outline:none;width:100%;transition:border-color .12s,box-shadow .12s;font-size:13.5px}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.sel{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:7px 11px;color:var(--text);outline:none;cursor:pointer;width:100%;transition:border-color .12s;font-size:13.5px}
.sel:focus{border-color:var(--accent)}
.sel option{background:#fff}
.txta{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);outline:none;width:100%;resize:vertical;font-size:13.5px;line-height:1.6}
.txta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.flbl{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fgrp{display:flex;flex-direction:column;margin-bottom:12px}
.ferr{font-size:11px;color:var(--red);margin-top:3px}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--r3);border:1px solid var(--border);background:var(--card)}
table{width:100%;border-collapse:collapse}
th{background:#F8FAFC;padding:9px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
tr.sel-row td{background:var(--accent-l)}
.td1{font-weight:500}
.td2{font-size:12px;color:var(--text3)}
.td-trunc{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--card);border-radius:var(--r3);box-shadow:var(--sh3);max-width:92vw;max-height:90vh;overflow-y:auto;animation:mIn .18s ease}
@keyframes mIn{from{transform:scale(.95) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-w480{width:480px}
.modal-w640{width:640px}
.modal-w860{width:860px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px}
.mt{font-family:var(--display);font-weight:600;font-size:16.5px}
.mb_{padding:0 22px 18px}
.mf{display:flex;justify-content:flex-end;gap:9px;padding:14px 22px;border-top:1px solid var(--border)}

/* TOAST */
.toast-wrap{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:11px 15px;font-size:13.5px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh2);animation:tIn .2s ease;min-width:260px;max-width:340px;pointer-events:all}
@keyframes tIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px}
.span2{grid-column:span 2}
.span3{grid-column:span 3}
.flex{display:flex}.aic{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}.gap4{gap:16px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mt5{margin-top:20px}.mt6{margin-top:24px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}.mb5{margin-bottom:20px}
.w100{width:100%}.fw5{font-weight:500}.fw6{font-weight:600}
.f12{font-size:12px}.f13{font-size:13px}.f11{font-size:11px}.text3{color:var(--text3)}.text2{color:var(--text2)}
.hr{height:1px;background:var(--border);margin:14px 0}
.page{padding:22px 26px}
.ph{margin-bottom:18px}
.ptitle{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.3px}
.psub{font-size:12.5px;color:var(--text3);margin-top:2px}
.empty{text-align:center;padding:56px 20px;color:var(--text3)}
.empty-ico{width:48px;height:48px;background:var(--bg);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.empty-t{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:5px}

/* FILTER CHIPS */
.fc{display:inline-flex;align-items:center;padding:5px 11px;background:var(--card);border:1px solid var(--border2);border-radius:20px;font-size:12.5px;color:var(--text2);cursor:pointer;transition:all .12s}
.fc:hover,.fc.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent)}
.fsel{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:5px 11px;font-size:12.5px;color:var(--text2);outline:none;cursor:pointer}
.fsel:focus{border-color:var(--accent)}

/* WELCOME BANNER */
.banner{background:linear-gradient(130deg,#2563EB 0%,#0D9488 100%);border-radius:var(--r3);padding:22px 26px;color:#fff;margin-bottom:18px;position:relative}
.banner::after{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;background:rgba(255,255,255,.06);border-radius:50%}
.banner-name{font-family:var(--display);font-size:19px;font-weight:700}
.banner-sub{font-size:12.5px;opacity:.82;margin-top:3px}
.banner-stats{display:flex;align-items:center;gap:20px;margin-top:16px;flex-wrap:wrap}
.bstat-val{font-family:var(--display);font-size:24px;font-weight:700;line-height:1}
.bstat-lbl{font-size:11px;opacity:.78;margin-top:4px}

/* STAT CARD */
.stat-ico{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-val{font-family:var(--display);font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-lbl{font-size:12px;color:var(--text3);margin-top:4px}

/* DETAIL PANEL */
.detail-panel{background:var(--card);border-left:1px solid var(--border);width:380px;min-width:380px;display:flex;flex-direction:column;overflow:hidden}
.dp-head{padding:16px 18px;border-bottom:1px solid var(--border)}
.dp-body{flex:1;overflow-y:auto;padding:14px 18px}
.dp-sec{margin-bottom:18px}
.dp-sec-t{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:9px}
.dp-row{display:flex;gap:8px;margin-bottom:7px;font-size:13px}
.dp-k{color:var(--text3);min-width:100px;flex-shrink:0}
.dp-v{color:var(--text);flex:1;word-break:break-word}
.act-item{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.act-txt{font-size:13px}
.act-meta{font-size:11.5px;color:var(--text3);margin-top:1px}

/* CONTACT PILL */
.cpill{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg);border-radius:var(--r);margin-bottom:6px;font-size:13px}
.ctype{font-size:10.5px;background:var(--border);padding:1px 6px;border-radius:4px;color:var(--text3);min-width:46px;text-align:center}

/* INDUSTRY BAR */
.ind-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.ind-row:last-child{border-bottom:none}
.ind-bg{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.ind-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* LOGIN */
.login-wrap{min-height:100vh;background:linear-gradient(150deg,#EFF6FF 0%,#F5F7FA 40%,#F0FDFA 100%);display:flex;align-items:center;justify-content:center;padding:16px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:var(--sh3);width:100%;max-width:440px;overflow:visible}
.login-top{background:linear-gradient(130deg,#2563EB 0%,#0D9488 100%);padding:24px 28px 20px;color:#fff;border-radius:20px 20px 0 0}
.login-body{padding:22px 28px 26px;border-radius:0 0 20px 20px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:10px;border:1.5px solid var(--border2);border-radius:var(--r2);background:var(--card);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:14px}
.google-btn:hover{background:var(--bg);border-color:var(--accent)}
.or-div{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:12px;color:var(--text3)}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}
.demo-picks{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* EMAIL */
.email-card{background:var(--bg);border-radius:var(--r2);padding:13px;margin-bottom:9px}
.email-subj{font-weight:500;font-size:13.5px}
.email-prev{font-size:12.5px;color:var(--text3);margin-top:4px;line-height:1.5}

/* BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:7px;height:80px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .4s ease;min-height:3px}
.bar-lbl{font-size:10.5px;color:var(--text3);margin-top:4px;text-align:center}
</style>
</head>

function genLeads(){
  var leads=[];var lid=1;

      var aid=rp(RA_IDS);var bid=RA_BD[aid];
      var st=rp(STAGES);var dt=rd(30);
      var fn=rp(FIRSTNAMES);var ln=rp(LASTNAMES);
      leads.push({
        id:"l"+lid++,coid:co.id,pos:rp(POSITIONS),
        fn:fn,ln:ln,desig:rp(["CTO","VP Ops","Head of Digital","Director","CFO","CHRO"]),

        li:"https://linkedin.com/in/"+fn.toLowerCase()+ln.toLowerCase(),

var clockTimer=null;
function startClock(){
  if(clockTimer)clearInterval(clockTimer);
  clockTimer=setInterval(function(){
    var n=new Date();
    var dt=document.getElementById("dash-clock-time");
    var dd=document.getElementById("dash-clock-date");
    if(dt)dt.textContent=n.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:true});
    if(dd)dd.textContent=n.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
  },1000);
}

function render(){
  var root=document.getElementById("app");
  if(!root)return;
  if(!STATE.user){root.innerHTML=renderLogin();bindLogin();return;}
  if(STATE.loading){
    root.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;background:var(--bg)">'+
      '<div style="width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite"></div>'+
      '<div style="font-size:13.5px;color:var(--text3)">Loading your data...</div>'+
      '<style>@keyframes spin{to{transform:rotate(360deg)}}</style>'+
    '</div>';
    return;
  }
  // Save all scroll positions before re-render
  var content=document.getElementById("content");
  var scrollTop=content?content.scrollTop:0;
  var pageEl=content?content.querySelector(".page"):null;
  var pageScroll=pageEl?pageEl.scrollTop:0;
  var winScroll=window.scrollY||0;
  root.innerHTML=renderApp();
  bindApp();
  startClock();
  // Restore scroll positions after re-render
  var newContent=document.getElementById("content");
  if(newContent){
    if(scrollTop)newContent.scrollTop=scrollTop;
    var newPage=newContent.querySelector(".page");
    if(newPage&&pageScroll)newPage.scrollTop=pageScroll;
  }
  if(winScroll)window.scrollTo(0,winScroll);
}

function getMyLeads(user){
  return STATE.leads.filter(function(l){
    if(l.del)return false;
    if(user.role==="ra")return l.aid===user.id;
    if(user.role==="bd")return l.bid===user.id;
    return true;
  });
}
function getTeam(user){
  if(user.role==="ra")return STATE.users.filter(function(u){return u.id===user.bdm});
  if(user.role==="bd")return STATE.users.filter(function(u){return u.bdm===user.id});
  return STATE.users.filter(function(u){return u.id!==user.id});
}
function filterLeads(leads){
  var f=STATE.leadsFilter;
  var today=todayIST();
  return leads.filter(function(l){
    if(f.date==="today"&&l.date!==today)return false;
    if(f.date==="week"){var w=new Date();w.setDate(w.getDate()-7);if(new Date(l.date)<w)return false;}
    if(f.date==="month"){var n=new Date();if(new Date(l.date).getMonth()!==n.getMonth())return false;}
    if(f.stage!=="all"&&l.stage!==f.stage)return false;
    if(f.ind!=="all"){var co=STATE.companies.find(function(c){return c.id===l.coid});if(!co||co.ind!==f.ind)return false;}
    if(f.search){
      var q=f.search.toLowerCase();
      var co2=STATE.companies.find(function(c){return c.id===l.coid});
      var vals=[l.email,l.fn,l.ln,co2?co2.name:"",l.pos,l.desig];
      if(!vals.some(function(v){return(v||"").toLowerCase().includes(q)}))return false;
    }
    return true;
  });
}
function periodLeads(user){
  var all=getMyLeads(user);
  var p=STATE.period;
  var now=new Date();
  return all.filter(function(l){
    var d=new Date(l.date);
    if(p==="daily")return l.date===todayIST();
    if(p==="weekly"){var w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(p==="monthly")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(p==="quarterly"){var q=new Date(now);q.setMonth(q.getMonth()-3);return d>=q;}
    return true;
  });
}
function fillEmail(tmpl,l,co,sender){
  return tmpl.replace(/{{(\w+)}}/g,function(m,k){
    var map={fn:l.fn,ln:l.ln,company:co?co.name:"",ind:co?co.ind:"",pos:l.pos,desig:l.desig,loc:co?co.loc:"",sender:sender||STATE.user.name};
    return map[k]!==undefined?map[k]:m;
  });
}

function filterPeriod(leads,p){
  var now=new Date();
  return leads.filter(function(l){
    var d=new Date(l.date);
    if(p==="daily")return l.date===todayIST();
    if(p==="weekly"){var w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(p==="monthly")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(p==="quarterly"){var q=new Date(now);q.setMonth(q.getMonth()-3);return d>=q;}
    return true;
  });
}

  var allSel=paginated.length>0&&paginated.every(function(l){return STATE.leadsSelected[l.id]});

    var co=STATE.companies.find(function(c){return c.id===l.coid})||{};

      '<td><div class="td1">'+l.pos+'</div><div class="td2">'+(l.fn?l.fn+' '+l.ln:'')+(l.desig?' · '+l.desig:'')+'</div></td>'+
      '<td><div class="td1">'+(co.name||l.coName||"")+'</div><div class="td2">'+((co.ind||l.coInd)||"")+((co.loc||l.coLoc)?' · '+(co.loc||l.coLoc):'')+'</div></td>'+
      '<td><select class="bdg '+stageClass(l.stage)+'" style="border:none;cursor:pointer;background:transparent;-webkit-appearance:none;font-weight:500;padding:2px 6px" onchange="changeStage(\''+l.id+'\',this.value)">'+stOpts+'</select></td>'+
      '<td class="f12 text3">'+l.src+'</td>'+
      (u.role!=="ra"?'<td class="f12">'+anName+'</td>':'')+
      '<td class="f12 text3" style="font-family:var(--mono)">'+fmtDate(l.date)+'</td>'+
      '<td><div class="flex gap1">'+
        '<button class="btn-icon" title="View" onclick="viewLead(\''+l.id+'\')">'+ico("eye",13)+'</button>'+
        '<button class="btn-icon" title="Send email" onclick="openMailMerge([\''+l.id+'\'])" style="color:var(--accent)">'+ico("email",13)+'</button>'+
        '<button class="btn-icon" style="color:var(--red)" title="Delete" onclick="deleteLead(\''+l.id+'\')">'+ico("trash",13)+'</button>'+
      '</div></td>'+
    '</tr>';
  }).join("");

  // ── PAGINATION CONTROLS ──────────────────────
  var pageSizeOpts=[20,50,100].map(function(n){
    return '<button class="fc'+(pageSize===n?" on":"")+'" onclick="setLeadsPageSize('+n+')">'+n+'</button>';
  }).join("");
  var paginationBar=filtered.length>pageSize?
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:8px 4px">'+
      '<div style="font-size:12.5px;color:var(--text3)">Showing '+(currentPage*pageSize+1)+'–'+Math.min((currentPage+1)*pageSize,filtered.length)+' of '+filtered.length+'</div>'+
      '<div class="flex gap2 aic">'+
        '<button class="btn btn-outline btn-sm" onclick="setLeadsPage('+(currentPage-1)+')" '+(currentPage===0?'disabled style="opacity:.4"':'')+'>← Prev</button>'+
        '<span style="font-size:12.5px;color:var(--text3)">Page '+(currentPage+1)+' / '+totalPages+'</span>'+
        '<button class="btn btn-outline btn-sm" onclick="setLeadsPage('+(currentPage+1)+')" '+(currentPage>=totalPages-1?'disabled style="opacity:.4"':'')+'>Next →</button>'+
      '</div>'+
    '</div>':"";

  var bulkBar=selCount>0?
    '<div style="display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--accent-l);border-radius:var(--r2);margin-bottom:11px;border:1px solid rgba(37,99,235,.18);flex-wrap:wrap">'+
      '<span style="font-size:13px;font-weight:500;color:var(--accent)">'+selCount+' selected</span>'+
      '<select class="sel" id="bulk-stage" style="width:160px;border-radius:20px;font-size:12.5px"><option value="">Change stage...</option>'+STAGES.map(function(s){return'<option>'+s+'</option>'}).join("")+'</select>'+
      '<button class="btn btn-primary btn-sm" onclick="applyBulk()">Apply stage</button>'+
      '<button class="btn btn-outline btn-sm" style="color:var(--accent);border-color:var(--accent)" onclick="openMailMerge(Object.keys(STATE.leadsSelected).filter(function(id){return STATE.leadsSelected[id]}))">'+ico("send",13)+' Mail merge ('+selCount+')</button>'+
      '<button class="btn btn-outline btn-sm" onclick="clearSel()">Clear</button>'+
    '</div>':"";

  var detailHtml=STATE.detailLead?renderDetailPanel():"";
  var tblStyle=STATE.detailLead?'flex:1;overflow:auto':'';

  return '<div style="display:flex;flex:1;overflow:hidden">'+
    '<div style="'+tblStyle+'">'+
    '<div class="page">'+
    '<div class="ph"><div class="flex jb" style="align-items:flex-start">'+
      '<div><div class="ptitle">Leads</div><div class="psub">'+filtered.length+' leads · showing '+pageSize+' per page</div></div>'+
      '<div class="flex gap2 aic">'+
        '<div class="flex gap1 aic"><span style="font-size:12px;color:var(--text3)">Per page:</span>'+pageSizeOpts+'</div>'+
        (u.role!=="ra"?'<button class="btn btn-outline btn-sm" onclick="exportXL()">'+ico("dl",13)+'Export</button>':'')+
        '<button class="btn btn-outline btn-sm" onclick="triggerImport()">'+ico("plus",13)+'Import Excel</button>'+
        '<input type="file" id="xl-import" accept=".xlsx,.xls,.csv" style="display:none" onchange="importXL(this)"/>'+
        '<button class="btn btn-primary btn-sm" onclick="openAddLead()">'+ico("plus",13)+'Add lead</button>'+
      '</div>'+
    '</div></div>'+

    '<div class="flex gap2 mb4 flex-wrap aic">'+
      '<div style="position:relative;flex:1;min-width:200px">'+
        '<span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3)">'+icon("search")+'</span>'+
        '<input class="inp" style="padding-left:34px" placeholder="Search by email, company, POC name, job title..." value="'+htmlEsc(STATE.leadsFilter.search)+'" oninput="setSearch(this.value)"/>'+
      '</div>'+
      '<select class="fsel" onchange="setFilt(\'date\',this.value)">'+dateOpts+'</select>'+
      '<select class="fsel" onchange="setFilt(\'stage\',this.value)"><option value="all"'+(STATE.leadsFilter.stage==="all"?" selected":"")+'>All stages</option>'+stageopts+'</select>'+
      '<select class="fsel" onchange="setFilt(\'ind\',this.value)"><option value="all"'+(STATE.leadsFilter.ind==="all"?" selected":"")+'>All industries</option>'+indopts+'</select>'+
    '</div>'+

    bulkBar+

    (filtered.length===0?
      '<div class="empty"><div class="empty-ico">'+ico("leads",22)+'</div><div class="empty-t">No leads found</div><div class="f13">Adjust filters or add a new lead</div></div>':
      '<div class="tbl-wrap"><table>'+
        '<thead><tr>'+
          '<th style="width:34px"><input type="checkbox" '+(allSel?"checked":"")+' onchange="toggleAll(this.checked)"/></th>'+
          '<th>Job title / Contact</th><th>Company</th><th>Stage</th>'+
          '<th>Source</th>'+(u.role!=="ra"?'<th>Analyst</th>':'')+
          '<th>Date</th><th></th>'+
        '</tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table></div>'+
      paginationBar)+

    '</div></div>'+

    detailHtml+

  '</div>';
}

function renderDetailPanel(){
  var l=STATE.detailLead;
  var co=STATE.companies.find(function(c){return c.id===l.coid})||{};
  var acts=STATE.activities.filter(function(a){return a.lid===l.id}).sort(function(a,b){return b.dt>a.dt?1:-1});
  var stOpts=STAGES.map(function(s){return'<option'+(l.stage===s?" selected":"")+'>'+s+'</option>'}).join("");

  var actRows=acts.map(function(a){
    var c=a.type==="email"?"var(--accent)":a.type==="stage"?"var(--amber)":"var(--green)";
    return '<div class="act-item"><div class="act-dot" style="background:'+c+'"></div><div><div class="act-txt">'+a.txt+'</div><div class="act-meta">'+uname(a.uid,STATE.users)+' · '+fmtDate(a.dt)+'</div></div></div>';

  return '<div class="detail-panel">'+
    '<div class="dp-head">'+
      '<div class="flex jb aic">'+
        '<div>'+
          '<div style="font-family:var(--display);font-weight:600;font-size:15.5px">'+l.fn+' '+l.ln+'</div>'+
          '<div class="f12 text3 mt1">'+l.desig+' · '+co.name+'</div>'+
        '</div>'+
        '<button class="btn-icon" onclick="closeDetail()">'+ico("x",14)+'</button>'+
      '</div>'+
      '<div class="flex aic gap2 mt2">'+
        '<select class="bdg '+stageClass(l.stage)+'" style="border:none;cursor:pointer;background:transparent;-webkit-appearance:none;font-weight:500;padding:3px 6px" onchange="changeStageDetail(this.value)">'+stOpts+'</select>'+
        '<span class="f11 text3">'+fmtDate(l.date)+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="dp-body">'+
      '<div class="dp-sec">'+
        '<div class="dp-sec-t">Contact</div>'+
        (l.email?'<div class="cpill"><span class="ctype">email</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+htmlEsc(l.email)+'</span><button class="btn-icon" title="Copy email" onclick="copyToClip(\''+htmlEsc(l.email)+'\')" style="flex-shrink:0;opacity:.5" onmouseenter="this.style.opacity=\'1\'" onmouseleave="this.style.opacity=\'.5\'">'+ico("copy",13)+'</button></div>':'')+
        (l.phone?'<div class="cpill"><span class="ctype">phone</span><span style="flex:1">'+htmlEsc(l.phone)+'</span><button class="btn-icon" title="Copy phone" onclick="copyToClip(\''+htmlEsc(l.phone)+'\')" style="flex-shrink:0;opacity:.5" onmouseenter="this.style.opacity=\'1\'" onmouseleave="this.style.opacity=\'.5\'">'+ico("copy",13)+'</button></div>':'')+
        (l.li?'<div class="cpill"><span class="ctype">linkedin</span><a href="'+l.li+'" target="_blank" style="color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">View Profile</a></div>':"")+
        '<button class="btn btn-outline btn-xs mt1" onclick="addContactPrompt()">+ Add contact</button>'+
      '</div>'+
      '<div class="hr"></div>'+
      '<div class="dp-sec">'+
        '<div class="dp-sec-t">Details</div>'+
        [["Position",l.pos],["Company",co.name],["Industry",co.ind],["Location",co.loc],["Website",co.web],["Source",l.src],["Analyst",uname(l.aid,STATE.users)],["BD Manager",uname(l.bid,STATE.users)]].map(function(r){
          return '<div class="dp-row"><span class="dp-k">'+r[0]+'</span><span class="dp-v">'+(r[1]||"—")+'</span></div>';
        }).join("")+
      '</div>'+
      '<div class="hr"></div>'+
      '<div class="dp-sec">'+
        '<div class="dp-sec-t">Notes</div>'+
        '<textarea class="txta" style="min-height:70px;font-size:13px" id="dp-notes" placeholder="Add notes...">'+htmlEsc(l.notes||"")+'</textarea>'+
        '<button class="btn btn-outline btn-sm mt2" onclick="saveNotes()">Save notes</button>'+
      '</div>'+
      '<div class="hr"></div>'+
      '<div class="dp-sec">'+
        '<div class="dp-sec-t">Activity log</div>'+

    '</div>'+
  '</div>';
}

// ── EMAIL ──────────────────────────────────────
function renderEmail(){
  var u=STATE.user;
  var myLeads=getMyLeads(u);
  var myEmails=STATE.emails.filter(function(e){return e.by===u.id||u.role==="admin"});
  var tabs=['compose','sent','templates'];

  var tabBar=tabs.map(function(t){
    return '<div class="tab'+(STATE.emailTab===t?" active":"")+'" onclick="setEmailTab(\''+t+'\')" style="text-transform:capitalize">'+t+'</div>';
  }).join("");

  // Build recipient info — either from selected lead or manual email
  var recipientInfo="";
  var hasRecipient=false;

  if(STATE.mergeLeadId){
    var ml=myLeads.find(function(l){return l.id===STATE.mergeLeadId});
    if(ml){
      var mlco=STATE.companies.find(function(c){return c.id===ml.coid})||{};
      hasRecipient=true;
      recipientInfo='<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--accent-l);border-radius:var(--r);margin-top:8px;border:1px solid rgba(37,99,235,.15)">'+
        '<div style="flex:1">'+
          '<div style="font-weight:500;font-size:13.5px">'+ml.fn+' '+ml.ln+(ml.desig?' · <span style="font-weight:400;color:var(--text2)">'+ml.desig+'</span>':'')+' </div>'+
          '<div class="f12 text3">'+mlco.name+' · '+ml.email+'</div>'+
        '</div>'+
        '<button class="btn-icon" onclick="STATE.mergeLeadId=null;STATE.genEmail=null;render()">'+ico("x",13)+'</button>'+
      '</div>';
    }
  } else if(STATE.manualEmail){
    hasRecipient=true;
    recipientInfo='<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--green-l);border-radius:var(--r);margin-top:8px;border:1px solid rgba(22,163,74,.15)">'+
      '<div style="flex:1"><div style="font-weight:500;font-size:13.5px">'+htmlEsc(STATE.manualEmailName||STATE.manualEmail)+'</div>'+
      '<div class="f12 text3">'+htmlEsc(STATE.manualEmail)+'</div></div>'+
      '<button class="btn-icon" onclick="STATE.manualEmail=null;STATE.manualEmailName=null;STATE.genEmail=null;render()">'+ico("x",13)+'</button>'+
    '</div>';
  }

  // Search results for email search
  var searchResults="";
  if(STATE.emailSearch&&STATE.emailSearch.length>1){
    var q=STATE.emailSearch.toLowerCase();
    var matches=myLeads.filter(function(l){
      return [l.email,l.fn,l.ln,l.pos].some(function(v){return(v||"").toLowerCase().includes(q);});
    }).slice(0,6);
    if(matches.length){
      searchResults='<div style="position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);z-index:50;max-height:220px;overflow-y:auto;margin-top:2px">';
      searchResults+=matches.map(function(l){
        var co=STATE.companies.find(function(c){return c.id===l.coid})||{};
        return '<div onclick="selectEmailRecipient(\''+l.id+'\')" style="display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border)" onmouseenter="this.style.background=\'var(--bg)\'" onmouseleave="this.style.background=\'\'">'+
          '<div style="flex:1">'+
            '<div style="font-size:13.5px;font-weight:500">'+l.fn+' '+l.ln+' <span style="font-weight:400;color:var(--text3)">· '+l.pos+'</span></div>'+
            '<div class="f12 text3">'+l.email+' · '+co.name+'</div>'+
          '</div>'+
        '</div>';
      }).join("");
      // Option to use typed email directly if it looks like an email
      if(STATE.emailSearch.includes("@")){
        searchResults+='<div onclick="useManualEmail()" style="display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;background:var(--bg)" onmouseenter="this.style.background=\'var(--accent-l)\'" onmouseleave="this.style.background=\'var(--bg)\'">'+
          '<span style="font-size:12px;padding:2px 8px;background:var(--accent);color:#fff;border-radius:10px">Send to</span>'+
          '<div class="f13">'+htmlEsc(STATE.emailSearch)+'</div>'+
        '</div>';
      }
      searchResults+='</div>';
    } else if(STATE.emailSearch.includes("@")){
      // No lead match but valid email — offer direct send
      searchResults='<div style="position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);z-index:50;margin-top:2px">'+
        '<div onclick="useManualEmail()" style="display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer" onmouseenter="this.style.background=\'var(--accent-l)\'" onmouseleave="this.style.background=\'\'">'+
          '<span style="font-size:12px;padding:2px 8px;background:var(--accent);color:#fff;border-radius:10px">Send to</span>'+
          '<div class="f13 fw5">'+htmlEsc(STATE.emailSearch)+'</div>'+
          '<div class="f12 text3">· manual email (not in leads)</div>'+
        '</div>'+
      '</div>';
    }
  }

  var preview="";
  if(STATE.genEmail){
    var ge=STATE.genEmail;
    preview='<div>'+
      '<div style="padding:10px 13px;background:var(--bg);border-radius:var(--r2) var(--r2) 0 0;border-bottom:1px solid var(--border)">'+
        '<div class="f12 text3"><strong style="color:var(--text)">To:</strong> '+htmlEsc(ge.to)+' &lt;'+htmlEsc(ge.email)+'&gt;</div>'+
        '<div class="f12 text3 mt1"><strong style="color:var(--text)">Subject:</strong> '+htmlEsc(ge.subj)+'</div>'+
      '</div>'+
      '<div style="padding:14px;background:var(--bg);border-radius:0 0 var(--r2) var(--r2);font-size:13px;line-height:1.7;white-space:pre-wrap">'+htmlEsc(ge.body)+'</div>'+
    '</div>';
  } else {
    preview='<div style="text-align:center;padding:40px 20px;color:var(--text3);font-size:13px">'+
      (hasRecipient?'Recipient selected. Click ✨ Generate with AI or edit the template and click Send.':'Search for a lead or type an email address to get started.')+
    '</div>';
  }

  var sentList='<div style="display:flex;gap:16px;align-items:flex-start">'+
    // Email list
    '<div style="flex:1;min-width:0">'+
    myEmails.map(function(e){
      var lead=STATE.leads.find(function(l){return l.id===e.lid;});
      var co=lead?STATE.companies.find(function(c){return c.id===lead.coid;})||{}:{};
      var isSelected=STATE.previewEmail&&STATE.previewEmail.id===e.id;
      return '<div class="email-card" onclick="previewEmail(\''+e.id+'\')" style="cursor:pointer;border:1.5px solid '+(isSelected?'var(--accent)':'transparent')+';transition:border .12s" onmouseenter="this.style.borderColor=\''+(isSelected?'var(--accent)':'var(--border2)')+'\';" onmouseleave="this.style.borderColor=\''+(isSelected?'var(--accent)':'transparent')+'\';">'+
        '<div class="flex jb" style="align-items:flex-start">'+
          '<div style="flex:1;min-width:0">'+
            '<div class="email-subj" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+htmlEsc(e.subj)+'</div>'+
            '<div class="f12 text3 mt1">To: '+htmlEsc(e.to)+(lead?' · '+htmlEsc(lead.fn+' '+lead.ln)+' · '+htmlEsc(co.name||''):'')+'</div>'+
          '</div>'+
          '<div style="text-align:right;flex-shrink:0;margin-left:12px">'+
            '<span class="bdg bdg-green">'+e.status+'</span>'+
            '<div class="f11 text3 mt1">'+fmtDate(e.dt)+' · '+(e.plt||"Gmail")+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="email-prev mt1">'+(e.body||"").slice(0,100)+'...</div>'+
      '</div>';
    }).join("")+
    '</div>'+

    // Preview panel
    (STATE.previewEmail?
      (function(){
        var pe=STATE.previewEmail;
        var lead=STATE.leads.find(function(l){return l.id===pe.lid;});
        var co=lead?STATE.companies.find(function(c){return c.id===lead.coid;})||{}:{};
        return '<div style="width:380px;flex-shrink:0;position:sticky;top:0;max-height:calc(100vh - 160px);overflow-y:auto">'+
          '<div class="card" style="border:1.5px solid var(--accent-l)">'+
            // Preview header
            '<div style="padding:14px 16px;background:var(--accent-l);border-radius:var(--r2) var(--r2) 0 0;border-bottom:1px solid rgba(37,99,235,.15)">'+
              '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
                '<div style="font-weight:600;font-size:13.5px;color:var(--accent)">Email Preview</div>'+
                '<button class="btn-icon" onclick="STATE.previewEmail=null;render()">'+ico("x",13)+'</button>'+
              '</div>'+
              '<div class="f12 text3 mt2"><strong style="color:var(--text)">To:</strong> '+htmlEsc(pe.to)+'</div>'+
              (lead?'<div class="f12 text3 mt1"><strong style="color:var(--text)">Contact:</strong> '+htmlEsc(lead.fn+' '+lead.ln)+' · '+htmlEsc(co.name||'')+'</div>':'')+
              '<div class="f12 text3 mt1"><strong style="color:var(--text)">Sent:</strong> '+fmtDate(pe.dt)+' via '+(pe.plt||"Gmail")+'</div>'+
            '</div>'+
            // Subject
            '<div style="padding:12px 16px;border-bottom:1px solid var(--border);background:var(--card)">'+
              '<div class="f11 text3" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Subject</div>'+
              '<div style="font-weight:600;font-size:13.5px">'+htmlEsc(pe.subj)+'</div>'+
            '</div>'+
            // Body
            '<div style="padding:14px 16px;font-size:13px;line-height:1.7;white-space:pre-wrap;overflow-y:auto;background:var(--card);border-radius:0 0 var(--r2) var(--r2)">'+htmlEsc(pe.body||"")+'</div>'+
          '</div>'+
        '</div>';
      })()
    :
      '<div style="width:300px;flex-shrink:0;display:flex;align-items:flex-start;padding-top:20px">'+
        '<div style="text-align:center;width:100%;padding:30px 20px;color:var(--text3);font-size:13px;background:var(--bg);border-radius:var(--r2);border:1.5px dashed var(--border2)">'+
          ico("email",24)+'<div style="margin-top:10px">Click any email<br>to preview it</div>'+
        '</div>'+
      '</div>'
    )+
  '</div>';

  var vars=[["{{fn}}","First name"],["{{company}}","Company"],["{{pos}}","Position"],["{{ind}}","Industry"],["{{desig}}","Designation"],["{{loc}}","Location"],["{{sender}}","Sender name"]];
  var varChips=vars.map(function(v){
    return '<button onclick="insertVar(\''+v[0]+'\')" style="font-size:11.5px;padding:4px 10px;background:var(--accent-l);color:var(--accent);border-radius:6px;cursor:pointer;font-family:var(--mono);border:1px solid rgba(37,99,235,.2);font-weight:500;transition:all .12s" onmouseenter="this.style.background=\'var(--accent)\';this.style.color=\'#fff\'" onmouseleave="this.style.background=\'var(--accent-l)\';this.style.color=\'var(--accent)\'">'+v[0]+'<span style="font-family:var(--font);font-size:10px;opacity:.7;margin-left:4px">'+v[1]+'</span></button>';
  }).join("");

  return '<div class="page">'+
    '<div class="ph"><div class="ptitle">Email</div><div class="psub">Compose, send and track outreach emails</div></div>'+
    '<div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto">'+tabBar+'</div>'+

    (STATE.emailTab==="compose"?
      '<div style="display:flex;gap:16px;align-items:flex-start;position:relative;flex-wrap:nowrap">'+

        // ── LEFT: compose form (full width or shrunk if preview open)
        '<div style="flex:1;min-width:0;transition:all .2s">'+
          '<div class="card cp mb4">'+
            '<div class="fw6 mb1">Recipient</div>'+
            '<div class="f12 text3 mb3">Search by name, email or job title — or type any email address directly</div>'+

// ── ADMIN ──────────────────────────────────────
function renderAdmin(){
  var u=STATE.user;
  var view=STATE.adminView||"bd";
  var bds=STATE.users.filter(function(x){return x.role==="bd"||x.role==="admin"});
  var ras=STATE.users.filter(function(x){return x.role==="ra"});
  var today=todayIST();

  // BD list view
  function bdStats(bd){
    var bdLeads=STATE.leads.filter(function(l){return!l.del&&l.bid===bd.id});
    var todayL=bdLeads.filter(function(l){return l.date===today});
    var monthL=bdLeads.filter(function(l){var d=new Date(l.date);var n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();});
    return{
      total:bdLeads.length,today:todayL.length,
      pos:monthL.filter(function(l){return l.stage==="Positive"||l.stage==="Connected"}).length,
      neg:monthL.filter(function(l){return l.stage==="Negative"}).length,
      resp:monthL.filter(function(l){return l.sent}).length,
      ras:STATE.users.filter(function(r){return r.bdm===bd.id&&r.role==="ra"}).length
    };
  }
  function raStats(ra){
    var raLeads=STATE.leads.filter(function(l){return!l.del&&l.aid===ra.id});
    var todayL=raLeads.filter(function(l){return l.date===today});
    var monthL=raLeads.filter(function(l){var d=new Date(l.date);var n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();});
    var bdUser=STATE.users.find(function(x){return x.id===ra.bdm});
    return{
      total:raLeads.length,today:todayL.length,
      pos:monthL.filter(function(l){return l.stage==="Positive"||l.stage==="Connected"}).length,
      neg:monthL.filter(function(l){return l.stage==="Negative"}).length,
      resp:monthL.filter(function(l){return l.sent}).length,
      bdName:bdUser?bdUser.name:"Unassigned"
    };
  }

  var bdRows=bds.map(function(bd){
    var s=bdStats(bd);
    var raList=STATE.users.filter(function(r){return r.bdm===bd.id&&r.role==="ra"});
    var raChips=raList.map(function(r){return'<span style="font-size:11px;padding:2px 7px;background:var(--green-l);color:var(--green);border-radius:10px;white-space:nowrap">'+r.name.split(" ")[0]+'</span>';}).join("");
    return '<tr>'+
      '<td><div class="flex aic gap2">'+av(bd,"32")+
        '<div><div class="td1">'+bd.name+'</div><div class="td2">'+bd.desig+'</div></div>'+
      '</div></td>'+
      '<td style="font-family:var(--mono);font-size:12px;color:var(--text3)">'+bd.empId+'</td>'+
      '<td><div class="flex gap1 flex-wrap">'+( raChips||'<span class="f11 text3">None</span>')+'</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px;color:var(--accent)">'+s.today+'</div><div class="f11 text3">today</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px">'+s.resp+'</div><div class="f11 text3">responses</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px;color:var(--green)">'+s.pos+'</div><div class="f11 text3">positive</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px;color:var(--red)">'+s.neg+'</div><div class="f11 text3">negative</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px;color:var(--text2)">'+s.total+'</div><div class="f11 text3">all time</div></td>'+
      '<td><span class="bdg '+(bd.role==="admin"?"bdg-purple":"bdg-blue")+'">'+roleLabel(bd.role)+'</span></td>'+
      '<td style="white-space:nowrap;width:64px;position:sticky;right:0;background:var(--card);box-shadow:-2px 0 4px rgba(0,0,0,.04)"><div class="flex gap1">'+
        '<button class="btn-icon" onclick="editUser(\''+bd.id+'\')">'+ico("edit",13)+'</button>'+
        (bd.id!==u.id?'<button class="btn-icon" style="color:var(--red)" onclick="removeUser(\''+bd.id+'\')">'+ico("trash",13)+'</button>':'')+
      '</div></td>'+
    '</tr>';
  }).join("");

  var raRows=ras.map(function(ra){
    var s=raStats(ra);
    return '<tr>'+
      '<td><div class="flex aic gap2">'+av(ra,"32")+
        '<div><div class="td1">'+ra.name+'</div><div class="td2">'+ra.desig+'</div></div>'+
      '</div></td>'+
      '<td style="font-family:var(--mono);font-size:12px;color:var(--text3)">'+ra.empId+'</td>'+
      '<td><span style="font-size:12px;padding:3px 8px;background:var(--accent-l);color:var(--accent);border-radius:10px">'+s.bdName+'</span></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px;color:var(--accent)">'+s.today+'</div><div class="f11 text3">today</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px">'+s.resp+'</div><div class="f11 text3">responses</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px;color:var(--green)">'+s.pos+'</div><div class="f11 text3">positive</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px;color:var(--red)">'+s.neg+'</div><div class="f11 text3">negative</div></td>'+
      '<td style="text-align:center"><div style="font-family:var(--display);font-weight:700;font-size:18px;color:var(--text2)">'+s.total+'</div><div class="f11 text3">all time</div></td>'+
      '<td><span class="bdg bdg-green">Research Analyst</span></td>'+
      '<td style="white-space:nowrap;width:64px;position:sticky;right:0;background:var(--card);box-shadow:-2px 0 4px rgba(0,0,0,.04)"><div class="flex gap1">'+
        '<button class="btn-icon" onclick="editUser(\''+ra.id+'\')">'+ico("edit",13)+'</button>'+
        '<button class="btn-icon" style="color:var(--red)" onclick="removeUser(\''+ra.id+'\')">'+ico("trash",13)+'</button>'+
      '</div></td>'+
    '</tr>';
  }).join("");

  var isBD=view==="bd";
  var colHeaders=isBD
    ?'<th>BD Manager</th><th>Emp ID</th><th>Assigned RAs</th><th style="text-align:center">Today</th><th style="text-align:center">Responses</th><th style="text-align:center">Positive</th><th style="text-align:center">Negative</th><th style="text-align:center">All Time</th><th>Role</th><th></th>'
    :'<th>Research Analyst</th><th>Emp ID</th><th>Assigned BD</th><th style="text-align:center">Today</th><th style="text-align:center">Responses</th><th style="text-align:center">Positive</th><th style="text-align:center">Negative</th><th style="text-align:center">All Time</th><th>Role</th><th></th>';

  return '<div class="page">'+
    '<div class="ph"><div class="flex jb aic">'+
      '<div><div class="ptitle">Admin · Team Management</div><div class="psub">'+(isBD?bds.length+" BD Managers":ras.length+" Research Analysts")+' · Fute Global LLC</div></div>'+
      '<button class="btn btn-primary btn-sm" onclick="openAddUser()">'+ico("plus",13)+'Add user</button>'+
    '</div></div>'+

    '<div class="flex gap2 mb4">'+
      '<button class="btn '+(isBD?"btn-primary":"btn-outline")+'" onclick="setAdminView(\'bd\')">'+ico("leads",14)+'BD Managers <span style="margin-left:4px;font-size:11px;opacity:.8">('+bds.length+')</span></button>'+
      '<button class="btn '+(isBD?"btn-outline":"btn-primary")+'" onclick="setAdminView(\'ra\')">'+ico("leads",14)+'Research Analysts <span style="margin-left:4px;font-size:11px;opacity:.8">('+ras.length+')</span></button>'+
    '</div>'+

    '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;margin-bottom:14px;display:flex;gap:20px;flex-wrap:wrap">'+
      '<div style="font-size:12px;color:var(--text3)">'+ico("star",12)+' Default view shows <strong style="color:var(--text)">this month\'s stats</strong>. Today = leads created today (resets 12AM IST).</div>'+
    '</div>'+

    '<div class="tbl-wrap">'+
      '<table>'+
        '<thead><tr>'+colHeaders+'</tr></thead>'+
        '<tbody>'+(isBD?bdRows:raRows)+'</tbody>'+
      '</table>'+
    '</div>'+
  '</div>';
}

// ── REMINDERS ─────────────────────────────────
function renderReminders(){
  var u=STATE.user;
  var today=todayIST();
  var myReminders=STATE.reminders.filter(function(r){return r.uid===u.id});
  var oooLeads=getMyLeads(u).filter(function(l){return l.stage==="Out of Office"});
  var due=myReminders.filter(function(r){return r.status==="pending"&&r.returnDate<=today});
  var upcoming=myReminders.filter(function(r){return r.status==="pending"&&r.returnDate>today});
  var sent=myReminders.filter(function(r){return r.status==="sent"});

  function daysUntil(d){return Math.ceil((new Date(d)-new Date(today))/86400000);}

  // Search results for new reminder
  var reminderSearchResults="";
  if(STATE.reminderSearch&&STATE.reminderSearch.length>1){
    var q=STATE.reminderSearch.toLowerCase();
    var allLeads=getMyLeads(u);
    var matches=allLeads.filter(function(l){
      return [l.email,l.fn,l.ln,l.pos,l.desig].some(function(v){return(v||"").toLowerCase().includes(q);});
    }).slice(0,6);
    if(matches.length){
      reminderSearchResults='<div style="position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);z-index:50;max-height:220px;overflow-y:auto;margin-top:2px">';
      reminderSearchResults+=matches.map(function(l){
        var co=STATE.companies.find(function(c){return c.id===l.coid})||{};
        return '<div onclick="openSetReminderFromSearch(\''+l.id+'\')" style="display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border)" onmouseenter="this.style.background=\'var(--bg)\'" onmouseleave="this.style.background=\'\'">'+
          '<div style="flex:1">'+
            '<div style="font-size:13.5px;font-weight:500">'+l.fn+' '+l.ln+' <span style="font-weight:400;color:var(--text3)">· '+l.pos+'</span></div>'+
            '<div class="f12 text3">'+l.email+' · '+co.name+'</div>'+
          '</div>'+
          '<span class="bdg '+stageClass(l.stage)+'">'+l.stage+'</span>'+
        '</div>';
      }).join("");
      reminderSearchResults+='</div>';
    } else {
      // No lead match — allow manual email reminder
      reminderSearchResults='<div style="position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);z-index:50;margin-top:2px">'+
        '<div style="padding:10px 13px;font-size:13px;color:var(--text3)">No leads found for "'+htmlEsc(STATE.reminderSearch)+'"</div>'+
        (STATE.reminderSearch.includes('@')?
          '<div onclick="openSetReminderManual(\''+htmlEsc(STATE.reminderSearch)+'\')" style="display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;border-top:1px solid var(--border)" onmouseenter="this.style.background=\'var(--accent-l)\'" onmouseleave="this.style.background=\'\'">'+
            '<span style="font-size:12px;padding:2px 8px;background:var(--accent);color:#fff;border-radius:10px">Set reminder for</span>'+
            '<div class="f13 fw5">'+htmlEsc(STATE.reminderSearch)+'</div>'+
          '</div>':"")+
      '</div>';
    }
  }

  var dueCards=due.map(function(r){
    var lead=STATE.leads.find(function(l){return l.id===r.lid});
    var co=lead?STATE.companies.find(function(c){return c.id===lead.coid})||{}:{};
    return '<div style="border:2px solid var(--amber);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;background:var(--amber-l)">'+
      '<div class="flex jb aic mb2">'+
        '<div class="flex aic gap2">'+
          '<div style="width:8px;height:8px;border-radius:50%;background:var(--amber)"></div>'+
          '<div style="font-weight:600;font-size:14px">'+htmlEsc(r.name)+'</div>'+
          '<span style="font-size:11px;padding:2px 7px;background:var(--amber);color:#fff;border-radius:10px">Due today</span>'+
        '</div>'+
        '<div class="flex gap2">'+
          '<button class="btn btn-sm" style="background:var(--amber);color:#fff" onclick="sendReminderEmail(\''+r.id+'\')">'+ico("send",13)+' Send follow-up</button>'+
          '<button class="btn btn-outline btn-sm" onclick="dismissReminder(\''+r.id+'\')">Dismiss</button>'+
        '</div>'+
      '</div>'+
      '<div class="f12 text3">'+htmlEsc(r.company||"")+(r.email?' · '+htmlEsc(r.email):'')+'</div>'+
      '<div class="f12 text3 mt1">Return date: '+fmtDate(r.returnDate)+' · '+r.reminderTime+' IST</div>'+
      (r.note?'<div class="f12" style="margin-top:6px;padding:6px 8px;background:rgba(0,0,0,.04);border-radius:var(--r)">'+htmlEsc(r.note)+'</div>':"")+
    '</div>';
  }).join("");

  var upcomingRows=upcoming.map(function(r){
    var days=daysUntil(r.returnDate);
    return '<tr>'+
      '<td><div class="td1">'+htmlEsc(r.name)+'</div><div class="td2">'+htmlEsc(r.company||"")+'</div></td>'+
      '<td class="f12 text3">'+htmlEsc(r.email||"")+'</td>'+
      '<td><span style="font-size:11.5px;padding:2px 8px;background:'+(days<=3?"var(--red-l)":"var(--accent-l)")+';color:'+(days<=3?"var(--red)":"var(--accent)")+';border-radius:10px">'+days+' day'+(days!==1?"s":"")+'</span></td>'+
      '<td class="f12 text3">'+fmtDate(r.returnDate)+'</td>'+
      '<td class="f12 text3">'+r.reminderTime+'</td>'+
      '<td class="f12" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+htmlEsc(r.note||"")+'</td>'+
      '<td><div class="flex gap1">'+
        '<button class="btn btn-outline btn-xs" onclick="editReminder(\''+r.id+'\')">Edit</button>'+
        '<button class="btn btn-danger btn-xs" onclick="dismissReminder(\''+r.id+'\')">Remove</button>'+
      '</div></td>'+
    '</tr>';
  }).join("");

  var oooList=oooLeads.map(function(l){
    var co=STATE.companies.find(function(c){return c.id===l.coid})||{};
    var hasReminder=STATE.reminders.some(function(r){return r.lid===l.id&&r.status==="pending"});
    return '<tr>'+
      '<td><div class="td1">'+l.fn+' '+l.ln+'</div><div class="td2">'+l.desig+'</div></td>'+
      '<td class="td1">'+co.name+'</td>'+
      '<td class="f12 text3">'+l.email+'</td>'+
      '<td>'+fmtDate(l.date)+'</td>'+
      '<td>'+(hasReminder?'<span class="bdg bdg-green">Reminder set</span>':'<button class="btn btn-primary btn-xs" onclick="openSetReminder(\''+l.id+'\')">+ Set reminder</button>')+'</td>'+
    '</tr>';
  }).join("");

  return '<div class="page">'+
    '<div class="ph flex jb aic">'+
      '<div><div class="ptitle">Reminders</div><div class="psub">Follow-up reminders for your contacts</div></div>'+
      '<button class="btn btn-primary btn-sm" onclick="openNewReminder()">'+ico("plus",13)+'New reminder</button>'+
    '</div>'+

    // Search to add reminder
    '<div class="card cp mb4">'+
      '<div class="fw6 mb1">Set a reminder</div>'+
      '<div class="f12 text3 mb3">Search for any lead or POC by name, email or job title — or type an email address directly</div>'+
      '<div style="position:relative">'+
        '<span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3)">'+icon("search")+'</span>'+
        '<input class="inp" style="padding-left:34px" id="rem-search-inp" placeholder="Search by name, email, job title..." value="'+htmlEsc(STATE.reminderSearch||"")+'" oninput="reminderSearchInput(this.value)" autocomplete="off"/>'+
        reminderSearchResults+
      '</div>'+
    '</div>'+

    // Due banner
    (due.length?
      '<div style="background:var(--amber-l);border:1.5px solid var(--amber);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">'+
        '<div style="font-size:20px">⏰</div>'+
        '<div style="flex:1"><div style="font-weight:600;font-size:14px">'+due.length+' reminder'+(due.length>1?"s":"")+" due"+'</div><div class="f12 text3">These contacts are expected back. Send your follow-up now.</div></div>'+
        '<button class="btn btn-sm" style="background:var(--amber);color:#fff" onclick="sendAllDue()">'+ico("send",13)+'Send all</button>'+
      '</div>'
    :"")+
    dueCards+

    // Upcoming
    '<div class="card cp mb4">'+
      '<div class="flex jb aic mb3">'+
        '<div><div class="fw6">Upcoming reminders</div><div class="f12 text3">'+upcoming.length+' pending</div></div>'+
      '</div>'+
      (upcoming.length?

// ── MAIL MERGE MODAL ───────────────────────────
function renderMailMergeModal(){
  var mm=STATE.mailMerge;
  if(!mm||!mm.leads||!mm.leads.length)return"";
  var idx=mm.currentIdx||0;
  var l=mm.leads[idx];
  var co=STATE.companies.find(function(c){return c.id===l.coid})||{};
  var total=mm.leads.length;
  var sent=mm.sent||0;
  var skipped=mm.skipped||0;

  // Current email content — use edited version if available, else build from template
  var current=mm.emails[idx]||{};
  var subj=current.subj||fillEmail(STATE.emailSubj,l,co,STATE.user.name);
  var body=current.body||fillEmail(STATE.emailBody,l,co,STATE.user.name);
  if(!mm.emails[idx])mm.emails[idx]={subj:subj,body:body,sent:false};

  var plt=STATE.user.plt||"Gmail";
  var isSent=mm.emails[idx]&&mm.emails[idx].sent;

  return '<div class="modal" style="width:700px;max-width:98vw;max-height:92vh;display:flex;flex-direction:column">'+
    // Header
    '<div class="mh">'+
      '<div>'+
        '<div class="mt">Mail Merge</div>'+
        '<div style="font-size:12px;color:var(--text3);margin-top:2px">'+
          sent+' sent · '+(total-sent-skipped)+' remaining · '+skipped+' skipped'+
        '</div>'+
      '</div>'+
      '<button class="btn-icon" onclick="closeMailMerge()">'+ico("x",14)+'</button>'+
    '</div>'+

    // Progress bar
    '<div style="padding:0 20px;background:var(--card)">'+
      '<div style="height:3px;background:var(--border);border-radius:2px">'+
        '<div style="height:3px;background:var(--accent);border-radius:2px;width:'+(sent/total*100)+'%;transition:width .3s"></div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0">'+
        // Prev arrow
        '<button onclick="mailMergeNav(-1)" '+(idx===0?'disabled style="opacity:.3"':'')+
          ' style="width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px">‹</button>'+
        // Lead info
        '<div style="text-align:center;flex:1;padding:0 14px">'+
          '<div style="font-weight:600;font-size:14px">'+htmlEsc(l.fn+' '+l.ln)+'</div>'+
          '<div style="font-size:12px;color:var(--text3)">'+htmlEsc(l.desig||"")+(co.name?' · '+htmlEsc(co.name):'')+'</div>'+
          '<div style="font-size:12px;color:var(--accent);margin-top:2px">'+htmlEsc(l.email||"No email")+'</div>'+
          '<div style="font-size:11px;color:var(--text3);margin-top:4px">'+
            (idx+1)+' of '+total+
            (isSent?' · <span style="color:var(--green);font-weight:500">✓ Sent</span>':'')+
          '</div>'+
        '</div>'+
        // Next arrow
        '<button onclick="mailMergeNav(1)" '+(idx>=total-1?'disabled style="opacity:.3"':'')+
          ' style="width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px">›</button>'+
      '</div>'+
    '</div>'+

    // Email editor
    '<div class="mb_" style="flex:1;overflow-y:auto;padding:16px 20px">'+
      '<div class="fgrp">'+
        '<label class="flbl">To</label>'+
        '<input class="inp" value="'+htmlEsc((l.fn||"")+" "+(l.ln||"")+" <"+(l.email||"")+">")+'" readonly style="background:var(--bg);color:var(--text2)"/>'+
      '</div>'+
      '<div class="fgrp">'+
        '<label class="flbl">Subject</label>'+
        '<input class="inp" id="mm-subj" value="'+htmlEsc(subj)+'" oninput="mailMergeEdit(\'subj\',this.value)"/>'+
      '</div>'+
      '<div class="fgrp">'+
        '<label class="flbl">Body</label>'+
        '<textarea class="txta w100" style="min-height:180px;font-size:13px" id="mm-body" oninput="mailMergeEdit(\'body\',this.value)">'+htmlEsc(body)+'</textarea>'+
      '</div>'+
    '</div>'+

    // Footer
    '<div class="mf" style="justify-content:space-between">'+
      '<div class="flex gap2">'+
        '<button class="btn btn-outline btn-sm" onclick="mailMergeSkip()" '+(isSent?'disabled style="opacity:.4"':'')+'>Skip</button>'+
        '<div class="flex gap1">'+
          '<button class="fc'+(plt==="Gmail"?" on":"")+'" onclick="setPlatform(\'Gmail\')">Gmail</button>'+
          '<button class="fc'+(plt==="Outlook"?" on":"")+'" onclick="setPlatform(\'Outlook\')">Outlook</button>'+
        '</div>'+
      '</div>'+
      '<div class="flex gap2">'+
        (isSent?
          '<span style="font-size:13px;color:var(--green);font-weight:500">✓ Sent</span>':
          '<button class="btn btn-primary" onclick="mailMergeSend()" '+(l.email?'':'disabled style="opacity:.4" title="No email address"')+'>'+ico("send",13)+' Send this email</button>'
        )+
        (idx<total-1?
          '<button class="btn btn-outline" onclick="mailMergeNav(1)">Next →</button>':
          '<button class="btn btn-outline" style="color:var(--green);border-color:var(--green)" onclick="closeMailMerge()">✓ Done</button>'
        )+
      '</div>'+
    '</div>'+
  '</div>';
}

window.generateAI=function(){
  var customInstructions=STATE.aiPrompt||STATE.aiPromptDefault;
  var promptEl=document.getElementById("ai-prompt-inp");
  if(promptEl&&promptEl.value)customInstructions=promptEl.value;

  // Handle manual email — no AI needed
  if(STATE.manualEmail&&!STATE.mergeLeadId){
    var subj=STATE.emailSubj.replace(/{{[\w]+}}/g,"");
    var body=STATE.emailBody.replace(/{{fn}}/g,"").replace(/{{[\w]+}}/g,"");
    STATE.genEmail={to:STATE.manualEmailName||STATE.manualEmail,email:STATE.manualEmail,subj:subj,body:body,lid:null};
    render();return;
  }
  if(!STATE.mergeLeadId){showToast("Select a recipient first","warning");return;}
  var ml=STATE.leads.find(function(l){return l.id==STATE.mergeLeadId;});
  if(!ml){showToast("Selected lead not found","error");return;}
  var co=STATE.companies.find(function(c){return c.id==ml.coid;})||{name:ml.coName,ind:ml.coInd,loc:ml.coLoc};

  // Show spinner — render() preserves scroll
  STATE.aiGenerating=true;render();

  // Helper: build a fallback genEmail from template (no AI)
  function fallbackToTemplate(){
    STATE.genEmail={to:ml.fn+" "+ml.ln,email:ml.email,subj:fillEmail(STATE.emailSubj,ml,co,STATE.user.name),body:fillEmail(STATE.emailBody,ml,co,STATE.user.name),lid:ml.id};
    STATE.aiGenerating=false;render();
  }

  // If running in LIVE (API layer present), call backend proxy. Otherwise fall back to local template fill.
  if(typeof apiPost==="function"){
    apiPost("/ai/generate-email",{
      lead:{first_name:ml.fn,last_name:ml.ln,position:ml.pos,designation:ml.desig,email:ml.email},
      company:{name:co.name,industry:co.ind,location:co.loc},
      template:{subject:STATE.emailSubj,body:STATE.emailBody},
      instructions:customInstructions
    }).then(function(data){
      var subj=data.subject||fillEmail(STATE.emailSubj,ml,co,STATE.user.name);
      var body=data.body||fillEmail(STATE.emailBody,ml,co,STATE.user.name);
      STATE.genEmail={to:ml.fn+" "+ml.ln,email:ml.email,subj:subj,body:body,lid:ml.id};
      STATE.aiGenerating=false;render();
      showToast("Email generated","success");
    }).catch(function(err){
      console.error("[generateAI] backend call failed:",err);
      showToast("AI generation failed — used template instead","warning");
      fallbackToTemplate();
    });
  } else {
    // Standalone offline mode — just use template fill
    fallbackToTemplate();
  }
};

window.copyToClip=function(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){showToast("Copied: "+text,"success");}).catch(function(){fallbackCopy(text);});
  } else {fallbackCopy(text);}
};
function fallbackCopy(text){
  var el=document.createElement("textarea");
  el.value=text;el.style.position="fixed";el.style.opacity="0";
  document.body.appendChild(el);el.select();
  try{document.execCommand("copy");showToast("Copied: "+text,"success");}catch(e){showToast("Copy failed","error");}
  document.body.removeChild(el);
}

  var gmailUser=STATE.user.email||"";

// Parse date from Excel — handles dd/mm/yyyy, yyyy-mm-dd, Excel serial numbers
function parseExcelDate(val){
  if(!val)return todayIST();
  if(typeof val==="number"){var d=new Date((val-25569)*86400000);return d.toISOString().split("T")[0];}
  var s=String(val).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  var m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(m)return m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
  var d2=new Date(s);
  if(!isNaN(d2))return d2.toISOString().split("T")[0];
  return todayIST();
}

window.importXL=function(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:"array"});
      var sheets=wb.SheetNames;
      STATE.importWB=wb;
      if(sheets.length===1){
        // Only one sheet — go straight to preview
        var ws=wb.Sheets[sheets[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:""});
        if(!rows.length){showToast("No data found in file","warning");return;}
        STATE.importPreview=rows;
        STATE.importSheet=sheets[0];
        STATE.modal=renderImportModal(rows,sheets[0]);
      } else {
        // Multiple sheets — show sheet picker first
        STATE.modal=renderSheetPickerModal(sheets);
      }
      render();
    }catch(err){showToast("Could not read file: "+err.message,"error");}
  };
  reader.readAsArrayBuffer(file);
}

// Column name mapping — accepts many variations
function mapCol(row, keys){
  var r={};
  Object.keys(row).forEach(function(k){
    var kl=k.toLowerCase().replace(/[\s_\-\.]/g,"");
    keys.forEach(function(pair){
      if(pair[0].some(function(v){return kl===v||kl.includes(v);})){
        if(!r[pair[1]])r[pair[1]]=String(row[k]||"").trim();
      }
    });
  });
  return r;
}

var COL_MAP=[
  [["companyname","company","firm","organisation","organization"],"company"],
  [["website","web","url","site"],"website"],
  [["industry","sector","vertical"],"industry"],
  [["location","city","place","region"],"location"],
  [["position","role","jobtitle","jobrole","openrole","vacancy","opening"],"position"],
  [["firstname","fname","first"],"firstName"],
  [["lastname","lname","last","surname"],"lastName"],
  [["designation","title","jobtitle","currenttitle"],"designation"],
  [["email","emailid","emailaddress","mail"],"email"],
  [["contact","phone","mobile","phonenumber","contactno","contactnumber"],"phone"],
  [["linkedin","linkedinurl","linkedinprofile","li"],"linkedin"],
  [["source","leadsource","foundon","platform"],"source"],
  [["date","leaddate","dateadded","createdon"],"date"],
  [["notes","note","comments","remarks"],"notes"],
];

window.confirmImport=function(){
  if(!STATE.importPreview||!STATE.importPreview.length){closeModal();return;}
  var mapped=STATE.importPreview.map(function(r){return mapCol(r,COL_MAP);});
  var validRows=mapped.filter(function(r){return r.email||r.company||r.firstName;});
  var today=todayIST();
  var imported=0;
  var skippedDupe=0;

  validRows.forEach(function(r){
    // Check for duplicate email
    if(r.email&&STATE.leads.find(function(l){return l.email&&l.email.toLowerCase()===r.email.toLowerCase()&&!l.del;})){
      skippedDupe++;return;
    }
    // Find or create company
    var coid="";
    if(r.company){
      var existing=STATE.companies.find(function(c){return c.name.toLowerCase()===r.company.toLowerCase();});
      if(existing){
        coid=existing.id;
      } else {
        var newco={id:"c"+Date.now()+imported,name:r.company,web:r.website||"",ind:r.industry||"",loc:r.location||""};
        STATE.companies.push(newco);
        coid=newco.id;
      }
    }
    var newlead={
      id:"l"+Date.now()+imported,
      coid:coid,
      pos:r.position||"",
      fn:r.firstName||r.company||"Unknown",
      ln:r.lastName||"",
      desig:r.designation||"",
      email:r.email||"",
      phone:r.phone||"",
      li:r.linkedin||"",
      src:r.source||"Import",
      aid:STATE.user.id,
      bid:STATE.user.bdm||STATE.user.id,
      stage:"Active",
      date:r.date?parseExcelDate(r.date):today,
      sent:null,plt:null,
      notes:r.notes||"",
      del:null
    };
    STATE.leads.unshift(newlead);
    STATE.activities.push({id:"a"+Date.now()+imported,lid:newlead.id,uid:STATE.user.id,type:"created",txt:"Lead imported from Excel",dt:today});
    imported++;
  });

  STATE.importPreview=null;
  closeModal();
  var msg=imported+" leads imported";
  if(skippedDupe)msg+=" · "+skippedDupe+" duplicates skipped";
  showToast(msg,"success");
  render();
}
